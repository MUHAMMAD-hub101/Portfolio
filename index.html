<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>OMEGA RAPTOR | Home</title>
    <link rel="icon" type="image/x-icon" href="favicon.png">
    <style>
        /* --- HIGH-LEVEL INDUSTRIAL CYBERPUNK HUD OVERHAUL --- */
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            user-select: none;
            -webkit-tap-highlight-color: transparent;
        }

        body {
            min-height: 100vh;
            /* Focus: Deep cinematic cybernetic space palette (Bluish) */
            background: radial-gradient(circle at 50% 25%, #065893 0%, #004a9f 50%, #000000 100%);
            display: flex;
            justify-content: center;
            align-items: center;
            font-family: 'Segoe UI', 'Poppins', system-ui, -apple-system, sans-serif;
            padding: 24px;
            overflow-x: hidden;
            position: relative;
        }

        /* Ambient digital matrix background pattern (Cyan/Blue Tint) */
        body::before {
            content: '';
            position: absolute;
            top: 0; left: 0; right: 0; bottom: 0;
            background: 
                linear-gradient(rgba(3, 136, 156, 0.012) 1px, transparent 1px),
                linear-gradient(90deg, rgba(34, 211, 238, 0.012) 1px, transparent 1px);
            background-size: 30px 30px;
            pointer-events: none;
            z-index: 0;
        }

        /* Top neon scanning baseline accent (Electric Blue) */
        body::after {
            content: '';
            position: absolute;
            top: 0; left: 0; width: 100%; height: 3px;
            background: linear-gradient(90deg, transparent, #22d3ee, #6366f1, #22d3ee, transparent);
            z-index: 10;
            filter: drop-shadow(0 0 8px #22d3ee);
        }
/* --- PREMIUM BLUISH CYBERPUNK SCROLLBAR STYLING --- */

/* 1. Scrollbar ka poora track width (No layout impact, elements safe) */
::-webkit-scrollbar {
    width: 10px;  /* Vertical scrollbar ki broadness */
    height: 10px; /* Horizontal scrollbar ki broadness */
}

/* 2. Scrollbar ka background track (Deep Dark Space Blend) */
::-webkit-scrollbar-track {
    background: #02080f; /* Aapke body background se perfectly blend hoga */
    border-left: 1px solid rgba(34, 211, 238, 0.05); /* Soft cyber edge line */
}

/* 3. Scrollbar ka Draggable handle (The Thumb - Neon Cyan Gradient Glow) */
::-webkit-scrollbar-thumb {
    background: linear-gradient(180deg, #0284c7 0%, #22d3ee 100%);
    border-radius: 10px; /* Smooth edges */
    border: 2px solid #02080f; /* Track se separation ke liye padding illusion */
    box-shadow: inset 0 0 6px rgba(34, 211, 238, 0.3);
}

/* 4. Handle par Hover karne ka dynamic effect (Electric Purple/Blue Shift) */
::-webkit-scrollbar-thumb:hover {
    background: linear-gradient(180deg, #22d3ee 0%, #6366f1 100%);
    box-shadow: 0 0 12px rgba(34, 211, 238, 0.8);
}

/* 5. Scrollbar Corners (Jahan vertical aur horizontal tracks milte hain) */
::-webkit-scrollbar-corner {
    background: #000103;
}
        /* Elite Glassmorphic Tactical Command Card (No hardcoded width/height here) */
        .home-card {
            /* Focus: Translucent deep blue-tinted matte panel background */
            background: linear-gradient(135deg, rgba(6, 93, 180, 0.527), rgba(0, 4, 11, 0.9));
            backdrop-filter: blur(35px);
            -webkit-backdrop-filter: blur(35px);
            border-radius: 24px;
            padding: 4.5rem 3.5rem;
            text-align: center;
            /* Focus: Fine neon cyan border tint */
            border: 1px solid rgba(34, 211, 238, 0.18);
            box-shadow: 0 40px 80px rgba(0, 0, 0, 0.9), 
                        inset 0 1px 2px rgba(255, 255, 255, 0.04),
                        0 0 60px rgba(34, 211, 238, 0.02);
            transition: transform 0.4s cubic-bezier(0.16, 1, 0.3, 1), border-color 0.4s, box-shadow 0.4s;
            position: relative;
            z-index: 1;
        }

        /* Tactical Faceted Corner Tech Accents (Blue & Purple Neon Glow) */
        .home-card::before {
            content: ''; position: absolute; top: -1px; left: 40px; width: 60px; height: 1px; background: #22d3ee; box-shadow: 0 0 8px #22d3ee;
        }
        .home-card::after {
            content: ''; position: absolute; bottom: -1px; right: 40px; width: 60px; height: 1px; background: #6366f1; box-shadow: 0 0 8px #6366f1;
        }

        .home-card:hover {
            transform: scale(1.015) translateY(-2px);
            border-color: rgba(34, 211, 238, 0.35);
            box-shadow: 0 50px 100px rgba(0, 0, 0, 0.95), 0 0 80px rgba(34, 211, 238, 0.05);
        }

        /* Searing High-Performance Title (Ice Blue Chrome Gradient) */
        h1 {
            font-size: 3.2rem;
            font-weight: 900;
            letter-spacing: 3px;
            background: linear-gradient(135deg, #ffffff 20%, #22d3ee 65%, #6366f1 100%);
            -webkit-background-clip: text;
            background-clip: text;
            color: transparent;
            margin-bottom: 0.8rem;
            filter: drop-shadow(0 0 15px rgba(34, 211, 238, 0.15));
            text-transform: uppercase;
        }

        /* Clean Technical HUD Divider Tagline */
        .tagline {
            color: #475569;
            font-size: 0.9rem;
            letter-spacing: 6px;
            text-transform: uppercase;
            font-weight: 800;
            margin-bottom: 3.5rem;
            border-bottom: 1px solid rgba(34, 211, 238, 0.2);
            display: inline-block;
            padding-bottom: 0.6rem;
        }

        /* Premium Mechanical Energy Button Structure (Deep Electric Blue Gradient) */
        .play-btn {
            background: linear-gradient(135deg, #0284c7 0%, #22d3ee 50%, #6366f1 100%);
            background-size: 200% auto;
            border: none;
            font-size: 1.1rem;
            letter-spacing: 3px;
            padding: 1.2rem 2.5rem;
            border-radius: 14px;
            cursor: pointer;
            font-weight: 900;
            box-shadow: 0 4px 25px rgba(34, 211, 238, 0.3);
            transition: all 0.4s cubic-bezier(0.16, 1, 0.3, 1);
            color: #01040a;
            margin: 1rem 0;
            text-transform: uppercase;
        }

        .play-btn:hover {
            background-position: right center;
            transform: translateY(-3px);
            box-shadow: 0 12px 35px rgba(34, 211, 238, 0.5);
            color: #ffffff;
        }

        /* Grid Framework for Features HUD Panels */
        .features {
            display: flex;
            justify-content: center;
            gap: 1rem;
            flex-wrap: wrap;
            margin: 3.5rem 0 0.5rem;
        }

        /* Micro HUD Feature Badge Backgrounds (Dark Blue Slate Tint) */
        .feature {
            background: rgba(1, 30, 74, 0.6);
            border-radius: 10px;
            padding: 0.7rem 1.2rem;
            font-size: 0.78rem;
            color: #94a3b8;
            font-weight: 700;
            letter-spacing: 1px;
            border: 1px solid rgba(0, 221, 255, 0.568);
            backdrop-filter: blur(10px);
            -webkit-backdrop-filter: blur(10px);
            transition: all 0.3s ease;
        }

        .feature:hover {
            border-color: rgba(34, 211, 238, 0.4) !important;
            background: rgba(0, 221, 255, 0.705);
            transform: translateY(-2px);
            color: #ffffff;
        }

        /* Minimal Micro-Faceted HUD Status Footer */
        footer {
            font-size: 0.7rem;
            color: #1e293b;
            margin-top: 3rem;
            letter-spacing: 4px;
            font-weight: bold;
            display: block;
            border-top: 1px dashed rgba(34, 211, 238, 0.1);
            padding-top: 1.5rem;
        }

        /* --- ONLY AND ONLY MEDIA QUERY RESPONSIBLE FOR WIDTH/HEIGHT ENGINE --- */
        @media screen and (max-width: 768px) {
            .home-card {
                width: 100%;       /* Width controlled strictly inside media query */
                max-width: 580px;  /* Safe clamping boundaries */
                padding: 3rem 1.5rem;
                border-radius: 20px;
            }
            h1 {
                font-size: 2.15rem;
                letter-spacing: 1.5px;
            }
            .tagline {
                font-size: 0.78rem;
                margin-bottom: 2.5rem;
            }
            .play-btn {
                width: 100%;       /* Expanding button container responsively */
                max-width: 320px;
                font-size: 0.95rem;
                padding: 1rem 2rem;
            }
            .features {
                margin-top: 2.5rem;
                gap: 0.6rem;
            }
            .feature {
                width: 100%;       /* Squeezing text rows to take full block rows stack */
                text-align: center;
            }
        }
    </style>
</head>
<body>
    
    <div class="home-card">
        <h1>🦖 OMEGA RAPTOR</h1>
        <div class="tagline">Run. Jump. Survive.</div>
        <button class="play-btn" onclick="window.location.href='game.html'">▶ PLAY NOW</button>
        <div class="features">
            <span class="feature">🌄 Dynamic Scenery</span>
            <span class="feature">🎵 Custom Sounds</span>
            <span class="feature">🏆 High Scores</span>
        </div>
        <footer>✦✦✦✦✦✦✦✦✦✦✦✦✦✦</footer>
    </div>
</body>
</html>
