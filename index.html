/* Engine-level configuration for smooth color blending */
@property --gradient-color-1 {
  syntax: '<color>';
  inherits: false;
  initial-value: #1a1c29;
}

@property --gradient-color-2 {
  syntax: '<color>';
  inherits: false;
  initial-value: #080b11;
}

html {
  min-height: 100vh;
  /* Applying modern multi-stop linear gradient */
  background-image: linear-gradient(135deg, var(--gradient-color-1), var(--gradient-color-2));
  background-attachment: fixed;
  /* steps(1) ko hta kar normal smooth transitions curves define kiye hain */
  animation: dynamicGradient 30s ease infinite;
}

@keyframes dynamicGradient {
  0%, 100% {
    --gradient-color-1: #1a1c29;
    --gradient-color-2: #080b11;
  }
  10% {
    --gradient-color-1: #0f2027;
    --gradient-color-2: #203a43;
  }
  20% {
    --gradient-color-1: #130cb7;
    --gradient-color-2: #52e5e7;
  }
  30% {
    --gradient-color-1: #2c3e50;
    --gradient-color-2: #000000;
  }
  40% {

    --gradient-color-2: #38ef7d;

  50% {
