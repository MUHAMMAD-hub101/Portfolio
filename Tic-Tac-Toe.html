<!DOCTYPE html>
<html lang="en" class="h-full">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Tic-Tac-Toe</title>
    <link rel="icon" href="tictactoe.png">
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        /* Scrollbar styling for Webkit browsers (Chrome, Safari, Edge) */
::-webkit-scrollbar {
    width: 8px;
    height: 8px;
}

::-webkit-scrollbar-track {
    background: #090a0f;
}

::-webkit-scrollbar-thumb {
    background: rgba(255, 255, 255, 0.1);
    border-radius: 10px;
    border: 1px solid rgba(255, 255, 255, 0.05);
}

::-webkit-scrollbar-thumb:hover {
    background: rgba(255, 255, 255, 0.2);
}

/* Firefox ke liye */
* {
    scrollbar-width: thin;
    scrollbar-color: rgba(255, 255, 255, 0.1) #090a0f;
}
        body { 
            min-height: 100dvh; 
            overflow-y: auto; 
            background: #090a0f; 
            background-image: radial-gradient(circle at 50% 50%, #1e293b 0%, #090a0f 100%);
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            padding: 20px 10px;
        }
        
        .glass-panel { 
            background: rgba(255, 255, 255, 0.03); 
            backdrop-filter: blur(20px); 
            border: 1px solid rgba(255, 255, 255, 0.08);
            box-shadow: 0 8px 32px 0 rgba(0, 0, 0, 0.8);
        }

        .box { 
            transition: all 0.4s cubic-bezier(0.165, 0.84, 0.44, 1); 
            text-shadow: 0 0 10px rgba(255,255,255,0.5);
        }
        
        .blur-game { 
            filter: blur(2px); 
            transition: all 0.5s ease; 
        }

        /* Neon Glows */
        .text-sky-400 { text-shadow: 0 0 15px #38bdf8; }
        .text-rose-400 { text-shadow: 0 0 15px #fb7185; }
        
        .game-wrapper {
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            gap: 1.5rem;
            width: 100%;
            max-width: 400px;
        }
        
    </style>
</head>
<body>

    <div class="game-wrapper">
        <h1 class="text-2xl md:text-3xl font-bold tracking-[0.4em] uppercase text-transparent bg-clip-text bg-gradient-to-r from-blue-400 to-rose-400">Tic Tac Toe</h1>

        <div id="setup" class="glass-panel p-8 rounded-3xl w-full flex flex-col gap-5 text-white">
            <input id="p1" class="bg-white/5 border border-white/10 p-3 rounded-xl outline-none focus:border-blue-500 transition-all" placeholder="Player 1 (O)">
            <input id="p2" class="bg-white/5 border border-white/10 p-3 rounded-xl outline-none focus:border-rose-500 transition-all" placeholder="Player 2 (X)">
            <button id="submit" class="bg-gradient-to-r from-blue-600 to-indigo-600 font-bold py-3 rounded-xl hover:shadow-[0_0_20px_rgba(37,99,235,0.5)] transition-all">Play</button>
        </div>

        <div id="game-ui" class="hidden flex flex-col items-center gap-4 w-full text-white">
            <div class="glass-panel px-8 py-3 rounded-full flex gap-10 font-bold tracking-widest text-xs uppercase border-white/20">
                <div><span id="name1" class="text-sky-400">P1</span>: <span id="score1">0</span></div>
                <div><span id="name2" class="text-rose-400">P2</span>: <span id="score2">0</span></div>
            </div>

            <div class="relative">
                <div id="board" class="grid grid-cols-3 gap-3 p-3 bg-white/5 rounded-3xl border border-white/5">
                    <script>for(let i=0; i<9; i++) document.write(`<button class="box w-20 h-20 md:w-28 md:h-28 glass-panel rounded-2xl text-4xl font-light flex items-center justify-center hover:bg-white/10"></button>`);</script>
                </div>
<div id="winner-overlay" class="absolute inset-0 hidden flex flex-col items-center justify-center gap-4 z-10 bg-black/40 backdrop-blur-sm rounded-3xl">
<div class="text-center text-xl md:text-2xl font-bold px-8 py-4 rounded-2xl border border-white/20 shadow-[0_0_30px_rgba(255,255,255,0.2)]"">
        <h2 id="winner-text" ></h2>
        <h1 >Wins!</h1>
    </div>
        <button id="nextround" class="px-6 py-2 rounded-xl border border-white/10 hover:bg-white hover:text-black transition-all text-[10px] md:text-xs uppercase tracking-widest">Next Round</button>
</div>
            </div>

            <div class="flex gap-4">
                <button id="newgame" class="px-6 py-2 rounded-xl border border-white/10 hover:bg-white hover:text-black transition-all text-[10px] md:text-xs uppercase tracking-widest">New Game</button>
                <button id="reset" class="px-6 py-2 rounded-xl border border-white/10 hover:bg-red-900/50 hover:border-red-500 transition-all text-[10px] md:text-xs uppercase tracking-widest">Reset All</button>
            </div>
        </div>
    </div>

    <script>
        let p1N, p2N, turnO = true, s1 = 0, s2 = 0;
        const boxes = document.querySelectorAll(".box");
        const board = document.getElementById("board");
        const overlay = document.getElementById("winner-overlay");
        const gameui= document.getElementById("game-ui");
        const setup= document.getElementById("setup");
        const name1= document.getElementById("name1");
        const name2= document.getElementById("name2");
        const p1 = document.getElementById("p1");
        const p2 = document.getElementById("p2");
        document.getElementById("submit").onclick = () => {
            p1N = p1.value || "Player 1";
            p2N = p2.value || "Player 2";
            name1.innerText = p1N;
            name2.innerText = p2N;
            setup.classList.add("hidden");
            gameui.classList.remove("hidden");
        };

        boxes.forEach(box => {
            box.onclick = () => {
                if(!box.innerText) {
                    box.innerText = turnO ? "O" : "X";
                    box.classList.add(turnO ? "text-sky-400" : "text-rose-400");
                    turnO = !turnO;
                    checkWinner();
                }
            };
        });
const score1=document.getElementById("score1");
const score2=document.getElementById("score2");

        function checkWinner() {
            const wins = [[0,1,2],[3,4,5],[6,7,8],[0,3,6],[1,4,7],[2,5,8],[0,4,8],[2,4,6]];
            for(let w of wins) {
                let [a,b,c] = [boxes[w[0]].innerText, boxes[w[1]].innerText, boxes[w[2]].innerText];
                if(a && a === b && b === c) {
                    showWinner(a === 'O' ? p1N : p2N);
                    if(a === 'O') s1++; else s2++;
                    score1.innerText = s1;
                    score2.innerText = s2;
                    return;
                }
            }
            if([...boxes].every(b => b.innerText)) showWinner("Draw");
        }

        function showWinner(text) {
            board.classList.add("blur-game");
            overlay.classList.remove("hidden");
            document.getElementById("winner-text").innerText = text === "Draw" ? "Match Draw!" : text ;
            boxes.forEach(b => b.disabled = true);
        }
        const newtgamefn = () => {
            board.classList.remove("blur-game");
            overlay.classList.add("hidden");
            boxes.forEach(b => { b.innerText = ""; b.disabled = false; b.classList.remove("text-sky-400", "text-rose-400"); });
            turnO = true;
            s1=0;
            s2=0;
            score1.innerHTML=s1;
            score2.innerHTML=s2;
        };
        document.getElementById("newgame").onclick = newtgamefn

        document.getElementById("nextround").onclick = () => {
            board.classList.remove("blur-game");
            overlay.classList.add("hidden");
            boxes.forEach(b => { b.innerText = ""; b.disabled = false; b.classList.remove("text-sky-400", "text-rose-400"); });
            turnO = true;
        };

        document.getElementById("reset").onclick = () => {
            gameui.classList.add("hidden");
            setup.classList.remove("hidden");
            p1.value="";
            p2.value="";
            newtgamefn()
        }
    </script>
</body>
</html>
