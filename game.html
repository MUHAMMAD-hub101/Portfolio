<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">

    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            user-select: none;
            -webkit-tap-highlight-color: transparent;
        }

        body {
            min-height: 100vh;
            background: radial-gradient(circle at 30% 20%, #000dff, #1100f9d8);
            display: flex;
            justify-content: center;
            align-items: center;
            font-family: 'Segoe UI', 'Poppins', 'Courier New', monospace;
            padding: 20px;
        }
/* --- PREMIUM BLUISH CYBERPUNK SCROLLBAR STYLING --- */

/* 1. Scrollbar ka poora track width (No layout impact, elements safe) */
::-webkit-scrollbar {
    width: 10px;  /* Vertical scrollbar ki broadness */
    height: 10px; /* Horizontal scrollbar ki broadness */
}

/* 2. Scrollbar ka background track (Deep Dark Space Blend) */
::-webkit-scrollbar-track {
    background: #02080f; /* Aapke body background se perfectly blend hoga */
    border-left: 1px solid rgba(34, 211, 238, 0.05); /* Soft cyber edge line */
}

/* 3. Scrollbar ka Draggable handle (The Thumb - Neon Cyan Gradient Glow) */
::-webkit-scrollbar-thumb {
    background: linear-gradient(180deg, #0284c7 0%, #22d3ee 100%);
    border-radius: 10px; /* Smooth edges */
    border: 2px solid #02080f; /* Track se separation ke liye padding illusion */
    box-shadow: inset 0 0 6px rgba(34, 211, 238, 0.3);
}

/* 4. Handle par Hover karne ka dynamic effect (Electric Purple/Blue Shift) */
::-webkit-scrollbar-thumb:hover {
    background: linear-gradient(180deg, #22d3ee 0%, #6366f1 100%);
    box-shadow: 0 0 12px rgba(34, 211, 238, 0.8);
}

/* 5. Scrollbar Corners (Jahan vertical aur horizontal tracks milte hain) */
::-webkit-scrollbar-corner {
    background: #000103;
}
        .navbar {
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            background: rgb(0, 29, 144);
            backdrop-filter: blur(12px);
            display: flex;
            justify-content: center;
            gap: 2rem;
            padding: 0.8rem 0;
            z-index: 100;
            border-bottom: 1px solid rgba(255,215,120,0.3);
            box-shadow: 0 4px 20px rgba(0,0,0,0.2);
        }
        .navbar a {
            color: #ffffff;
            text-decoration: none;
            font-weight: bold;
            font-size: 1.1rem;
            padding: 0.3rem 1.2rem;
            border-radius: 3rem;
            transition: all 0.2s;
            letter-spacing: 1px;
        }
        .navbar a:hover {
            background: rgba(255, 255, 255, 0.427);
            transform: translateY(-2px);
        }

        .game-hub {
            background: rgba(43, 61, 255, 0.75);
            backdrop-filter: blur(8px);
            border-radius: 3rem;
            padding: 1.5rem;
            box-shadow: 0 30px 40px rgba(0,0,0,0.6), inset 0 1px 2px rgba(255,220,140,0.2);
            border: 1px solid rgba(200,170,100,0.5);
            width: fit-content;
            max-width: 1200px;
            margin-top: 70px;
        }

        canvas {
            display: block;
            margin: 0 auto;
            border-radius: 2rem;
            box-shadow: 0 15px 30px rgba(0, 0, 0, 0.5);
            cursor: pointer;
            width: 100%;
            height: auto;
            background: #cfddb5;
        }

        .dashboard {
            display: flex;
            justify-content: space-between;
            align-items: center;
            flex-wrap: wrap;
            gap: 1rem;
            margin: 1.2rem 0.5rem 0.8rem 0.5rem;
        }

        .stat-card {
            background: linear-gradient(transparent, blue);
            padding: 0.3rem 1.4rem;
            border-radius: 3rem;
            font-weight: bold;
            color: #ffffff;
            font-size: 1.5rem;
            font-family: monospace;
            border: 1px solid #ffffff;
            display: flex;
            align-items: center;
            gap: 8px;
            backdrop-filter: blur(4px);
        }
        .stat-card span {
            font-size: 0.8rem;
            margin-right: 6px;
            color: #ffdd99fa;
        }
        .reset-best {
            background: blue;
            border: none;
            color: #ffffff;
            font-size: 1rem;
            cursor: pointer;
            padding: 0 4px;
            border-radius: 50%;
            transition: 0.1s;
        }
        .reset-best:hover {
            background: rgba(0, 149, 255, 0.411);
            transform: scale(1.1);
        }

        .controls {
            display: flex;
            gap: 12px;
            align-items: center;
            flex-wrap: wrap;
        }

        .difficulty-select, button {
            background: linear-gradient(transparent, blue);
            border: 1px solid #ffffff;
            font-family: inherit;
            font-weight: bold;
            font-size: 0.9rem;
            padding: 6px 18px;
            border-radius: 3rem;
            cursor: pointer;
            transition: 0.07s linear;
            box-shadow: 0 4px 0 #9bbaff;
        }
        #startBtn, #restartBtn, #stopResumeBtn {
            color: #ffffff;
        }
        #restartBtn, #stopResumeBtn {
            display: none;
        }
        #startBtn:active, #restartBtn:active, #stopResumeBtn:active {
            color: #2eb797;
        }

        button:active, .difficulty-select:active {
            transform: translateY(2px);
            box-shadow: 0 1px 0 #269dcc;
            color: #ffdd99;
        }
        .difficulty-select {
            background: linear-gradient(#0091a1d0, rgb(0, 66, 120));
            color: #ffcf7a;
            box-shadow: 0 3px 0 #1f1a0e;
        }
        option {
            background: #007a99;
            color: #000000;
        }

        .footer-note {
            text-align: center;
            font-size: 0.75rem;
            color: #0055cb; 
            letter-spacing: 2px;
            margin-top: 3rem;
            display: block;
            font-weight: bold;
            position: relative;
            padding: 10px 20px;
            transition: all 0.4s cubic-bezier(0.16, 1, 0.3, 1);
        }

        /* Individual Spans Base Configuration */
        .footer-note span {
            display: inline-block;
            transition: all 0.4s cubic-bezier(0.16, 1, 0.3, 1);
        }

        /* Base Colors Before Hover */
        .footer-note .cyber-star { color: #fcfdfe; }
        .footer-note .cyber-dots { color: #ffffff; letter-spacing: 4px; }
        .footer-note .cyber-line { color: rgb(244, 238, 238); }
        .footer-note .cyber-core { color: #f5f6f9; transform: scale(1); }

        /* --- PREMIUM INTERACTIVE HOVER EFFECTS (Jab Main Card par Hover hoga) --- */

        /* 1. Cyber Stars: Glow aur Breath Effect */
        .home-card:hover .footer-note .cyber-star {
            color: #22d3ee;
            text-shadow: 0 0 10px #22d3ee;
            animation: starPulse 1.5s infinite ease-in-out;
        }

        /* 2. Cyber Dots: Shifting aur Range Colors */
        .home-card:hover .footer-note .cyber-dots {
            color: #6366f1;
            text-shadow: 0 0 8px #6366f1;
        }

        /* 3. Cyber Line: Light Speed Beam Effect */
        .home-card:hover .footer-note .cyber-line {
            color: rgba(34, 211, 238, 0.5);
            text-shadow: 0 0 4px rgba(34, 211, 238, 0.3);
        }

        /* 4. Cyber Core: Chota Bada Hona (Size Pulse) + Intense Glow */
        .home-card:hover .footer-note .cyber-core {
            color: #ffffff;
            text-shadow: 0 0 15px #22d3ee, 0 0 30px #6366f1;
            animation: coreSizeChange 2s infinite ease-in-out;
        }

        /* 5. Custom Dynamic Border Lines for Footer Box */
        .footer-note::before,
        .footer-note::after {
            content: '';
            position: absolute;
            width: 0%;
            height: 1px;
            background: linear-gradient(90deg, transparent, #22d3ee, transparent);
            transition: width 0.6s cubic-bezier(0.16, 1, 0.3, 1);
            opacity: 0;
        }

        .footer-note::before { top: 0; left: 50%; transform: translateX(-50%); }
        .footer-note::after { bottom: 0; left: 50%; transform: translateX(-50%); }

        /* Hover hone par fine borders expanding effect */
        .home-card:hover .footer-note::before,
        .home-card:hover .footer-note::after {
            width: 60%; 
            opacity: 1;
        }

        /* --- ANIMATIONS KEYFRAMES ENGINE --- */
        @keyframes starPulse {
            0%, 100% { transform: scale(1); opacity: 0.7; }
            50% { transform: scale(1.3); opacity: 1; }
        }

        @keyframes coreSizeChange {
            0%, 100% { 
                transform: scale(1); 
                filter: brightness(1); 
            }
            50% { 
                transform: scale(1.4); 
                filter: brightness(1.5); 
            }
        }

        .toast {
            position: fixed;
            bottom: 30px;
            right: 30px;
            background: #1e2a1aee;
            backdrop-filter: blur(12px);
            color: #ffdf8c;
            padding: 12px 24px;
            border-radius: 50px;
            font-size: 0.9rem;
            font-weight: bold;
            z-index: 1000;
            border-left: 5px solid #ffb347;
            box-shadow: 0 5px 20px rgba(0,0,0,0.3);
            opacity: 0;
            transform: translateX(30px);
            transition: all 0.3s ease;
            pointer-events: none;
        }
        .toast.show { opacity: 1; transform: translateX(0); }
        .toast.error { border-left-color: #00f2fe; background: #101a2bee; color: #aaccff; }

        /* --- ONLY AND ONLY MEDIA QUERY RESPONSIBLE FOR WIDTH/HEIGHT ENGINE --- */
        @media (max-width: 780px) {
            body {
                padding: 10px; /* Reducing screen bounding space */
            }

            .navbar {
                gap: 0.5rem;
                padding: 0.6rem 0.2rem;
            }

            .navbar a {
                font-size: 0.85rem;
                padding: 0.2rem 0.6rem;
                letter-spacing: 0px;
            }

            .game-hub {
                width: 100%;       /* Fluid responsiveness layer rules inside media query */
                max-width: 100%;   
                padding: 0.8rem;
                border-radius: 1.5rem;
                margin-top: 60px;
            }

            canvas {
                border-radius: 1rem;
            }

            .dashboard {
                flex-direction: column; /* Stack data items top to bottom on tiny mobile layouts */
                justify-content: center;
                gap: 0.8rem;
                margin: 1rem 0 0.5rem 0;
            }

            .stat-card { 
                width: 100%;       /* Stretch cards out row by row cleanly */
                justify-content: center;
                font-size: 1.1rem; 
                padding: 0.4rem 1rem; 
                border-radius: 1rem;
            }

            .controls {
                width: 100%;       
                justify-content: center;
                gap: 8px;
            }

            button, .difficulty-select { 
                flex-grow: 1;      /* Fluid grids configuration engine scales tabs */
                text-align: center;
                font-size: 0.75rem; 
                padding: 8px 12px; 
                border-radius: 1rem;
            }

            .toast {
                bottom: 15px;
                right: 15px;
                left: 15px;
                font-size: 0.8rem;
                padding: 10px 16px;
                text-align: center;
                border-left: none;
                border-bottom: 4px solid #ffb347;
                transform: translateY(20px);
            }
            .toast.show { transform: translateY(0); }
            .toast.error { border-bottom-color: #00f2fe; }
        }</style>

    <script>
        function showNotification(message, isError = false) {
            const toast = document.createElement('div');
            toast.className = 'toast' + (isError ? ' error' : '');
            toast.textContent = message;
            document.body.appendChild(toast);
            setTimeout(() => toast.classList.add('show'), 10);
            setTimeout(() => {
                toast.classList.remove('show');
                setTimeout(() => toast.remove(), 300);
            }, 2500);
        }

        const canvas = document.getElementById('gameCanvas');
        const ctx = canvas.getContext('2d');
        canvas.width = 1100;
        canvas.height = 260;

        const GROUND_Y = 240;
        const DINO_W = 44;
        const DINO_H = 54;
        const DINO_X = 110;
        const GRAVITY = 0.82;
        const JUMP_POWER = -13.5;

        let gameState = 'idle';
        let gameOverStep = 0, gameOverTimer = 0, zoom = 1;
        let score = 0, currentDifficulty = 'medium';
        let highScores = { easy: 0, medium: 0, hard: 0 };
        
        try {
            highScores.easy = parseInt(localStorage.getItem('dinoHigh_easy')) || 0;
            highScores.medium = parseInt(localStorage.getItem('dinoHigh_medium')) || 0;
            highScores.hard = parseInt(localStorage.getItem('dinoHigh_hard')) || 0;
        } catch(e) {
            showNotification("Error loading high scores", true);
        }
        
        let currentSpeed = 5.5;
        let dinoY = GROUND_Y - DINO_H;
        let dinoVy = 0;
        let onGround = true;
        let obstacles = [];
        let spawnDelay = 0;
        
        let cloudOffset = 0;
        let midgroundOffset = 0;
        let foregroundOffset = 0;
        
        let weatherType = 'summer';
        let weatherParticles = [];
        let viewCycleTimer = 0;
        let currentViewIndex = 0;
        
        // --- TRANSITION STATE ENGINE VARIABLES ---
        let previousViewIndex = 0;
        let viewTransitionProgress = 1.0; 
        const TRANSITION_DURATION = 300; // 5 seconds smooth interpolation fade time

        const viewsConfig = [
            { id: 0,  name: 'Neo Desert Oasis',  weather: 'summer', sky1: '#0b132b', sky2: '#1c2541', ground: '#3e4a4c', obsType: 'cactus' },
            { id: 1,  name: 'Alpine Ridge',       weather: 'winter', sky1: '#0f172a', sky2: '#1e293b', ground: '#cbd5e1', obsType: 'rock' },
            { id: 2,  name: 'Cyber City 2026',    weather: 'spring', sky1: '#020617', sky2: '#0f172a', ground: '#1e293b', obsType: 'building' },
            { id: 3,  name: 'Boreal Canopy',      weather: 'autumn', sky1: '#022c22', sky2: '#064e3b', ground: '#14532d', obsType: 'tree' },
            { id: 4,  name: 'Titanium Monolith',  weather: 'summer', sky1: '#1c1917', sky2: '#292524', ground: '#44403c', obsType: 'rock' },
            { id: 5,  name: 'Grid Core Matrix',   weather: 'spring', sky1: '#000000', sky2: '#050515', ground: '#0f172a', obsType: 'crystal' },
            { id: 6,  name: 'Chromium Coast',     weather: 'summer', sky1: '#0f172a', sky2: '#1e293b', ground: '#334155', obsType: 'bush' },
            { id: 7,  name: 'Abyssal Mire',       weather: 'autumn', sky1: '#064e3b', sky2: '#022c22', ground: '#065f46', obsType: 'tree' },
            { id: 8,  name: 'Nebula Veil',        weather: 'winter', sky1: '#3b0764', sky2: '#1e1b4b', ground: '#4c1d95', obsType: 'crystal' },
            { id: 9,  name: 'Automated Foundry',  weather: 'spring', sky1: '#262626', sky2: '#171717', ground: '#404040', obsType: 'building' },
            { id: 10, name: 'Obsidian Trench',    weather: 'summer', sky1: '#18181b', sky2: '#09090b', ground: '#27272a', obsType: 'spike' },
            { id: 11, name: 'Stratosphere Lab',   weather: 'winter', sky1: '#0891b2', sky2: '#155e75', ground: '#ecfeff', obsType: 'building' },
            { id: 12, name: 'Aether Glen',        weather: 'spring', sky1: '#581c87', sky2: '#3b0764', ground: '#6b21a8', obsType: 'tree' },
            { id: 13, name: 'Glacial Plain',      weather: 'winter', sky1: '#164e63', sky2: '#155e75', ground: '#cffafe', obsType: 'rock' },
            { id: 14, name: 'Amber Savanna',      weather: 'autumn', sky1: '#1e293b', sky2: '#0f172a', ground: '#475569', obsType: 'bush' }
        ];

        let sceneryType = 'mountain';
        let invincibleTimer = 0;
        let isSpeedRamping = false;
        let rampStartSpeed = 0, rampTargetSpeed = 0, rampTimer = 0;
        const RAMP_DURATION = 120;
        let dinoFlash = 0;
        let scoreHold = false;
        let hitParticles = []; 
        
        let BASE_SPEED = 5.5, MAX_SPEED = 13.5, SPEED_SCORE_STEP = 580;
        let SPAWN_BASE_DELAY_MIN = 36, SPAWN_BASE_DELAY_MAX = 58, SPAWN_REDUCTION_FACTOR = 2.4;
        
        let audioCtx = null;
        let activeSource = null;
        let globalSoundLibrary = [];
        let soundSelections = { jump: 'default', hit: 'default', start: 'default', stop: 'default', restart: 'default', resume: 'default' };
        let defaultBuffers = {};
        
        function initAudio() {
            if (audioCtx) return;
            try {
                audioCtx = new (window.AudioContext || window.webkitAudioContext)();
                loadGlobalLibrary();
                updateAllSoundBuffers();
            } catch(e) { console.warn("Web Audio not supported"); }
        }
        
        function loadGlobalLibrary() {
            try {
                let stored = localStorage.getItem('globalSoundLibrary');
                if (stored) globalSoundLibrary = JSON.parse(stored);
                let selections = localStorage.getItem('soundSelections');
                if (selections) soundSelections = JSON.parse(selections);
            } catch(e) {
                globalSoundLibrary = [];
            }
        }
        
        function getDefaultBuffer(type) {
            if (defaultBuffers[type]) return defaultBuffers[type];
            if (!audioCtx) return null;
            let buffer = null;
            if (type === 'jump') buffer = createSineBuffer(0.18, 620);
            else if (type === 'hit') buffer = createSawBuffer(0.32, 240);
            else if (type === 'start') buffer = createSineBuffer(0.12, 880);
            else if (type === 'stop') buffer = createSawBuffer(0.2, 180);
            else if (type === 'restart') buffer = createSineBuffer(0.15, 520);
            else if (type === 'resume') buffer = createSineBuffer(0.12, 660);
            defaultBuffers[type] = buffer;
            return buffer;
        }
        
        function createSineBuffer(duration, freq) {
            const sampleRate = audioCtx.sampleRate;
            const frames = duration * sampleRate;
            const buffer = audioCtx.createBuffer(1, frames, sampleRate);
            const data = buffer.getChannelData(0);
            for (let i = 0; i < frames; i++) {
                data[i] = Math.sin(2 * Math.PI * freq * i / sampleRate) * 0.5;
                data[i] *= (1 - i/frames);
            }
            return buffer;
        }
        
        function createSawBuffer(duration, freq) {
            const sampleRate = audioCtx.sampleRate;
            const frames = duration * sampleRate;
            const buffer = audioCtx.createBuffer(1, frames, sampleRate);
            const data = buffer.getChannelData(0);
            for (let i = 0; i < frames; i++) {
                let t = (i / sampleRate) * freq;
                data[i] = (t - Math.floor(t)) * 2 - 1;
                data[i] *= 0.3 * (1 - i/frames);
            }
            return buffer;
        }
        
        async function updateAllSoundBuffers() {
            for (let type of Object.keys(soundSelections)) {
                const selected = soundSelections[type];
                if (selected === 'default') {
                    defaultBuffers[type] = getDefaultBuffer(type);
                } else {
                    const item = globalSoundLibrary.find(s => s.name === selected);
                    if (item && audioCtx) {
                        try {
                            const arrayBuffer = await fetch(item.dataURL).then(res => res.arrayBuffer());
                            defaultBuffers[type] = await audioCtx.decodeAudioData(arrayBuffer);
                        } catch(e) {
                            defaultBuffers[type] = getDefaultBuffer(type);
                        }
                    } else {
                        defaultBuffers[type] = getDefaultBuffer(type);
                    }
                }
            }
        }
        
        function playSound(type, volume=0.2) {
            const buf = defaultBuffers[type];
            if (!audioCtx || !buf) return;
            if (activeSource) { try { activeSource.stop(); } catch(e) {} }
            const source = audioCtx.createBufferSource();
            const gain = audioCtx.createGain();
            source.buffer = buf;
            source.connect(gain);
            gain.connect(audioCtx.destination);
            gain.gain.value = volume;
            source.start();
            activeSource = source;
        }
        
        function updateTimeBasedView() {
            viewCycleTimer++;
            if (viewTransitionProgress < 1.0) {
                viewTransitionProgress += 1.0 / TRANSITION_DURATION;
                if (viewTransitionProgress > 1.0) viewTransitionProgress = 1.0;
            }
            
            if (viewCycleTimer >= 600) {
                viewCycleTimer = 0;
                previousViewIndex = currentViewIndex;
                currentViewIndex = (currentViewIndex + 1) % viewsConfig.length;
                viewTransitionProgress = 0.0; // Trigger the smooth cross-fade animation loop
                initWeatherParticles();
            }
            weatherType = viewsConfig[currentViewIndex].weather;
            sceneryType = viewsConfig[currentViewIndex].name;
        }

        function initWeatherParticles() {
            const activeW = viewsConfig[currentViewIndex].weather;
            let count = activeW === 'winter' ? 140 : activeW === 'spring' ? 85 : activeW === 'autumn' ? 110 : 45;
            weatherParticles = [];
            for(let i=0; i<count; i++) {
                weatherParticles.push({
                    x: Math.random() * canvas.width,
                    y: Math.random() * canvas.height,
                    size: 1 + Math.random() * 3.5,
                    speed: 1.2 + Math.random() * 3,
                    drift: -Math.abs(0.2 + Math.random() * 0.8), 
                    angle: Math.random() * Math.PI * 2
                });
            }
        }
        
        function updateWeatherParticles() {
            for (let p of weatherParticles) {
                p.y += p.speed;
                p.x += p.drift;
                p.angle += 0.02;
                if (p.y > canvas.height) { p.y = 0; p.x = Math.random() * canvas.width; }
                if (p.x < 0) p.x = canvas.width;
            }
        }
        
        function drawWeather() {
            const activeW = viewsConfig[currentViewIndex].weather;
            ctx.save();
            if (viewTransitionProgress < 1.0) {
                ctx.globalAlpha = viewTransitionProgress; // Smooth fade-in weather particles
            }
            if (activeW === 'winter') {
                ctx.fillStyle = "rgba(255, 255, 255, 0.85)";
                for (let p of weatherParticles) {
                    ctx.beginPath(); ctx.arc(p.x, p.y, p.size, 0, Math.PI*2); ctx.fill();
                }
            } else if (activeW === 'spring') {
                ctx.strokeStyle = "rgba(6, 182, 212, 0.45)";
                ctx.lineWidth = 1.5;

        function drawGround() {

    ctx.beginPath(); ctx.arc(x + DINO_W + 8, y + 8, 2.5, 0, Math.PI * 2); ctx.fill();
    ctx.shadowBlur = 0; // Reset

    // Steely Claws
    let runCycle = Date.now() * 0.022;
    let legMovement = Math.sin(runCycle) * 7;
    let rightLegY = y + DINO_H - 10 + (legMovement < 0 ? -legMovement : 0);
    
    ctx.fillStyle = "#1f2937"; ctx.fillRect(x + 14, rightLegY, 8, 13);
    ctx.fillStyle = "#a855f7"; ctx.fillRect(x + 12, rightLegY + 11, 12, 3.5);

    ctx.restore();

}
}

        function drawObstacles() {
            let dayFactor = getDayNightFactor();

            for(let obs of obstacles) {
                ctx.save();
                
                // Obstacle structural shape allocation occurs during creation phase (obs.visualStyle),
                // ensuring objects don't abruptly morph style midpoint across screen boundaries.
                let oType = obs.visualStyle; 
                
                if (oType === 'cactus') {
                    ctx.shadowBlur = 18; 
                    ctx.shadowColor = "#39ff14"; 
                    ctx.strokeStyle = "#39ff14";
                    ctx.lineWidth = 3;
                    ctx.fillStyle = "#0f5132"; 
                    
                    ctx.beginPath(); 
                    ctx.roundRect(obs.x + obs.w/2 - 6, obs.y, 12, obs.h, [8, 8, 0, 0]); 
                    ctx.fill(); ctx.stroke();
                    
                    ctx.beginPath();
                    ctx.roundRect(obs.x - 5, obs.y + obs.h * 0.35, 10, obs.h * 0.35, 5);
                    ctx.roundRect(obs.x - 5, obs.y + obs.h * 0.6, obs.w/2 + 2, 9, 4);
                    ctx.fill(); ctx.stroke();
                    
                    ctx.beginPath();
                    ctx.roundRect(obs.x + obs.w - 5, obs.y + obs.h * 0.2, 10, obs.h * 0.4, 5);
                    ctx.roundRect(obs.x + obs.w/2 - 2, obs.y + obs.h * 0.52, obs.w/2 + 6, 9, 4);
                    ctx.fill(); ctx.stroke();
                    
                    ctx.shadowBlur = 0;
                    ctx.fillStyle = "#39ff14";
                    ctx.fillRect(obs.x + obs.w/2 - 1, obs.y + 12, 2, obs.h - 25);
                } 
                else if (oType === 'building') {
                    ctx.fillStyle = "#0ea5e9"; ctx.shadowColor = "#22d3ee"; ctx.shadowBlur = 10;
                    ctx.beginPath();
                    ctx.moveTo(obs.x + obs.w/2, obs.y);
                    ctx.lineTo(obs.x, obs.y + obs.h);
                    ctx.lineTo(obs.x + obs.w, obs.y + obs.h);
                    ctx.closePath(); ctx.fill();
                } 
                else if (oType === 'rock') {
                    ctx.fillStyle = "#475569"; ctx.shadowColor = "#64748b"; ctx.shadowBlur = 5;
                    ctx.beginPath();
                    ctx.moveTo(obs.x, obs.y + obs.h);
                    ctx.lineTo(obs.x + obs.w/3, obs.y + obs.h/4);
                    ctx.lineTo(obs.x + (obs.w*2)/3, obs.y);
                    ctx.lineTo(obs.x + obs.w, obs.y + obs.h);
                    ctx.closePath(); ctx.fill();
                } 
                else if (oType === 'tree') {
                    ctx.fillStyle = "#1e293b";
                    ctx.fillRect(obs.x + obs.w/2 - 3, obs.y + obs.h/2, 6, obs.h/2);
                    ctx.fillStyle = "#065f46";
                    ctx.beginPath(); ctx.arc(obs.x + obs.w/2, obs.y + obs.h/3, obs.w, 0, Math.PI*2); ctx.fill();
                }
                else if (oType === 'crystal') {
                    ctx.fillStyle = "#a855f7"; ctx.shadowColor = "#c084fc"; ctx.shadowBlur = 12;
                    ctx.beginPath();
                    ctx.moveTo(obs.x + obs.w/2, obs.y);
                    ctx.lineTo(obs.x + obs.w, obs.y + obs.h/2);
                    ctx.lineTo(obs.x + obs.w/2, obs.y + obs.h);
                    ctx.lineTo(obs.x, obs.y + obs.h/2);
                    ctx.closePath(); ctx.fill();
                }
                else {
                    ctx.fillStyle = "#334155";
                    ctx.beginPath(); ctx.arc(obs.x + obs.w/2, obs.y + obs.h/2, obs.w/2, 0, Math.PI*2); ctx.fill();
                }
                ctx.restore();
            }
        }
        
        function drawUI() {
            ctx.font = "bold 13px monospace"; ctx.fillStyle = "rgba(255,255,255,0.9)";
            ctx.fillText("⚡ SPEED "+currentSpeed.toFixed(1), canvas.width-120, 32);
            ctx.fillText(currentDifficulty.toUpperCase() + " MODE", canvas.width-115, 58);
            let percent = (currentSpeed - BASE_SPEED) / (MAX_SPEED - BASE_SPEED);
            percent = Math.min(1, Math.max(0, percent));
            ctx.fillStyle = "#22d3ee"; ctx.fillRect(canvas.width-80, 44, 60*percent, 4);
            
            ctx.font = "bold 11px monospace";
            ctx.fillText("📍 " + viewsConfig[currentViewIndex].name.toUpperCase(), canvas.width-175, 18);

            if (invincibleTimer > 0) {
                ctx.font = "bold 10px monospace"; ctx.fillStyle = "#38bdf8";
                ctx.fillText("✨ CORE SAFE", canvas.width-115, 76);
            }
        }
        
        function triggerShatterFX() {
            hitParticles = [];
            for (let i = 0; i < 65; i++) {
                hitParticles.push({
                    x: DINO_X + Math.random() * DINO_W,
                    y: dinoY + Math.random() * DINO_H,
                    vx: (Math.random() - 0.35) * 8, 
                    vy: (Math.random() - 0.7) * 9,
                    size: 1.5 + Math.random() * 5,
                    alpha: 1,
                    rotation: Math.random() * Math.PI,
                    rotSpeed: (Math.random() - 0.5) * 0.25,
                    color: i % 3 === 0 ? "#22d3ee" : (i % 3 === 1 ? "#0284c7" : "#e2e8f0") 
                });
            }
        }

        function updateHitParticles() {
            for (let p of hitParticles) {
                p.x += p.vx; p.y += p.vy;
                p.vy += 0.18; 
                p.rotation += p.rotSpeed;
                p.alpha -= 0.014;
            }
            hitParticles = hitParticles.filter(p => p.alpha > 0);
        }

        function drawHitParticles() {
            ctx.save();
            for (let p of hitParticles) {
                ctx.save();
                ctx.globalAlpha = p.alpha;
                ctx.translate(p.x, p.y);
                ctx.rotate(p.rotation);
                ctx.fillStyle = p.color;
                ctx.shadowBlur = 6; ctx.shadowColor = p.color;
                ctx.fillRect(-p.size/2, -p.size/2, p.size, p.size);
                ctx.restore();
            }
            ctx.restore();
        }

        function drawGameOverAnimation() {
            ctx.save();
            updateHitParticles();
            
            if (gameOverStep === 0) {
                ctx.translate(canvas.width/2, canvas.height/2);
                ctx.scale(zoom, zoom);
                ctx.translate(-canvas.width/2, -canvas.height/2);
                drawPalaceInterior();
                drawHitParticles();
            } else {
                drawPalaceInterior();
                drawHitParticles();
                
                const centerX = canvas.width/2, centerY = canvas.height/2 - 10;
                ctx.fillStyle = "rgba(15, 23, 42, 0.96)"; 
                ctx.strokeStyle = "rgba(34, 211, 238, 0.5)";
                ctx.lineWidth = 1.5;
                ctx.beginPath(); ctx.roundRect(centerX - 160, centerY - 45, 320, 90, 16); ctx.fill(); ctx.stroke();

                ctx.font = "bold 20px 'Segoe UI', Roboto, sans-serif";
                ctx.fillStyle = "#22d3ee"; ctx.textAlign = "center";
                ctx.fillText("Game Over", centerX, centerY - 10);
                
                ctx.font = "500 12px sans-serif"; ctx.fillStyle = "rgba(255,255,255,0.6)";
                ctx.fillText("Press RESTART or SPACE to play again", centerX, centerY + 20);
            }
            ctx.restore();
        }
        
        function drawPalaceInterior() {
            ctx.fillStyle = "#070a13";
            ctx.fillRect(0, 0, canvas.width, canvas.height);
            ctx.fillStyle = "#0f172a";
            ctx.fillRect(0, GROUND_Y, canvas.width, canvas.height - GROUND_Y);
            
            ctx.strokeStyle = "rgba(34, 211, 238, 0.04)"; ctx.lineWidth = 2;
            for(let i=0; i<6; i++) {
                ctx.strokeRect(80 + i * 200, 0, 40, canvas.height);
            }
        }
        
        function drawStartMessage() {
            if (gameState === 'idle') {
                const gradient = ctx.createRadialGradient(canvas.width / 2, canvas.height / 2, 10, canvas.width / 2, canvas.height / 2, canvas.width / 1.2);
                gradient.addColorStop(0, "#0b132b"); gradient.addColorStop(1, "#010811"); 
                ctx.fillStyle = gradient; ctx.fillRect(0, 0, canvas.width, canvas.height);

                ctx.fillStyle = "rgba(13, 148, 136, 0.05)"; ctx.strokeStyle = "rgba(0, 242, 254, 0.2)"; ctx.lineWidth = 1;
                ctx.fillRect(canvas.width/2 - 160, canvas.height/2 - 60, 320, 120);
                ctx.strokeRect(canvas.width/2 - 160, canvas.height/2 - 60, 320, 120);

                ctx.font = "bold 24px 'Segoe UI', sans-serif"; ctx.fillStyle = "#00f2fe"; ctx.textAlign = "center";
                ctx.fillText("CLICK TO START", canvas.width / 2, canvas.height / 2 - 15);
                ctx.font = "500 13px sans-serif"; ctx.fillStyle = "rgba(0, 242, 254, 0.6)"; 
                ctx.fillText("OR PRESS SPACE", canvas.width / 2, canvas.height / 2 + 25);
            } else if (gameState === 'paused') {
                ctx.fillStyle = "rgba(1, 8, 17, 0.85)"; ctx.fillRect(0, 0, canvas.width, canvas.height);
                ctx.strokeStyle = "rgba(0, 210, 255, 0.25)"; ctx.lineWidth = 1.5;
                ctx.strokeRect(canvas.width / 2 - 170, canvas.height / 2 - 65, 340, 130);

                ctx.font = "bold 28px sans-serif"; ctx.fillStyle = "#00d2ff"; ctx.textAlign = "center";
                ctx.fillText("GAME PAUSED", canvas.width / 2, canvas.height / 2 - 15);
                ctx.font = "600 11px sans-serif"; ctx.fillStyle = "rgba(224, 247, 250, 0.7)"; 
                ctx.fillText("CLICK RESUME OR PRESS SPACE", canvas.width / 2, canvas.height / 2 + 30);
            }
        }
        
        function render() {
            ctx.textAlign = "left"; 
            if (gameState === 'gameOverAnimation') {
                drawGameOverAnimation();
            } else if (gameState === 'playing' || gameState === 'paused') {
                drawSky();
                drawClouds();
                drawScenery();
                drawWeather();
                drawGround();
                drawObstacles();
                drawDino();
                drawUI();
                if (gameState === 'paused') drawStartMessage();
            } else {
                drawStartMessage();
            }
        }
        
        function applyDifficulty(level) {
            currentDifficulty = level;
            switch(level) {
                case 'easy':
                    BASE_SPEED = 4.8; MAX_SPEED = 11.5; SPEED_SCORE_STEP = 700;
                    SPAWN_BASE_DELAY_MIN = 48; SPAWN_BASE_DELAY_MAX = 72; SPAWN_REDUCTION_FACTOR = 1.8;
                    break;
                case 'medium':
                    BASE_SPEED = 5.5; MAX_SPEED = 13.5; SPEED_SCORE_STEP = 580;
                    SPAWN_BASE_DELAY_MIN = 36; SPAWN_BASE_DELAY_MAX = 58; SPAWN_REDUCTION_FACTOR = 2.4;
                    break;
                case 'hard':
                    BASE_SPEED = 6.2; MAX_SPEED = 15.2; SPEED_SCORE_STEP = 480;
                    SPAWN_BASE_DELAY_MIN = 28; SPAWN_BASE_DELAY_MAX = 46; SPAWN_REDUCTION_FACTOR = 3.0;
                    break;
            }
            currentSpeed = BASE_SPEED;
            document.getElementById('bestVal').innerText = highScores[level];
        }
        
        function updateHighScore() {
            const floorScore = Math.floor(score);
            if (floorScore > highScores[currentDifficulty]) {
                highScores[currentDifficulty] = floorScore;
                document.getElementById('bestVal').innerText = floorScore;
                localStorage.setItem(`dinoHigh_${currentDifficulty}`, floorScore);
            }
        }
        
        function updateUI() {
            document.getElementById('scoreVal').innerText = Math.floor(score);
            updateHighScore();
        }
        
        function updateSpeedByScore() {
            let increment = Math.floor(score / SPEED_SCORE_STEP);
            let newSpeed = BASE_SPEED + increment * 0.95;
            if(newSpeed > MAX_SPEED) newSpeed = MAX_SPEED;
            currentSpeed = newSpeed;
        }
        
        function spawnObstacle() {
            if(obstacles.length > 0 && obstacles[obstacles.length-1].x > canvas.width - 140) return;
            const height = Math.floor(Math.random() * (52 - 28 + 1) + 28);
            
            // Assigning type configuration directly onto the item instance so it persists its organic aesthetic
            let currentType = viewsConfig[currentViewIndex].obsType;
            obstacles.push({ 
                x: canvas.width + 20, 
                w: 20, 
                h: height, 
                y: GROUND_Y - height,
                visualStyle: currentType 
            });
        }
        
        function checkCollision() {
            if (invincibleTimer > 0) return false;
            const dinoRect = { x: DINO_X, y: dinoY, w: DINO_W, h: DINO_H };
            for(let obs of obstacles) {
                if(dinoRect.x < obs.x + obs.w && dinoRect.x + dinoRect.w > obs.x &&
                   dinoRect.y < obs.y + obs.h && dinoRect.y + dinoRect.h > obs.y) return true;
            }
            return false;
        }
        
        function performJump() {
            if(gameState !== 'playing') return;
            if(onGround) {
                dinoVy = JUMP_POWER;
                onGround = false;
                playSound('jump', 0.2);
            }
        }
        
        function startGameOverAnimation() {
            gameState = 'gameOverAnimation';
            gameOverStep = 0; gameOverTimer = 0; zoom = 1;
            triggerShatterFX();
            updateHighScore();
            obstacles = [];
        }
        
        function updateGameOverAnimation() {
            if (gameState !== 'gameOverAnimation') return;
            gameOverTimer++;
            if (gameOverStep === 0) {
                zoom = Math.min(3, zoom + 0.08);
                if (zoom >= 3) { gameOverStep = 1; gameOverTimer = 0; }
            } else if (gameOverStep === 1) {
                if (gameOverTimer >= 60) gameOverStep = 2;
            }
        }
        
        function freshStart() {
            gameState = 'playing';
            score = 0;
            viewCycleTimer = 0;
            currentViewIndex = 0;
            previousViewIndex = 0;
            viewTransitionProgress = 1.0; 
            const diff = document.getElementById('difficultySelect').value;
            applyDifficulty(diff);
            dinoY = GROUND_Y - DINO_H;
            dinoVy = 0;
            onGround = true;
            obstacles = [];
            spawnDelay = 16;
            updateUI();
            updateSpeedByScore();
            playSound('start', 0.2);
            invincibleTimer = 0;
            isSpeedRamping = false;
            scoreHold = false;
            dinoFlash = 0;
            initWeatherParticles();
        }
        
        function startGame() {
            restartBtn.style.display = 'inline-block';
            stopResumeBtn.style.display = 'inline-block';
            startBtn.style.display = 'none'; 
            if (gameState === 'playing' || gameState === 'paused') return;
            freshStart();
        }
        
        function stopResume() {
            if (gameState === 'playing') {
                gameState = 'paused';
                document.getElementById('stopResumeBtn').innerText = '▶ RESUME';
                playSound('stop', 0.22);
                window._pausedSpeed = currentSpeed;
            } else if (gameState === 'paused') {
                gameState = 'playing';
                document.getElementById('stopResumeBtn').innerText = '⏹ STOP';
                playSound('resume', 0.2);
                invincibleTimer = 150;
                scoreHold = true;
                rampTargetSpeed = window._pausedSpeed || currentSpeed;
            }
        }
        
        function restartGame() {
            freshStart();
            playSound('restart', 0.2);
            document.getElementById('stopResumeBtn').innerText = '⏹ STOP';
        }
        
        function resetHighScore() {
            highScores[currentDifficulty] = 0;
            localStorage.setItem(`dinoHigh_${currentDifficulty}`, 0);
            document.getElementById('bestVal').innerText = 0;
            showNotification(`High score for ${currentDifficulty} reset`);
        }
        
        function updateGame() {
            if (gameState !== 'playing') return;

            updateTimeBasedView();
            
            if (invincibleTimer > 0) {
                invincibleTimer--;
                if (Math.floor(invincibleTimer/2)%2===0) dinoFlash=1; else dinoFlash=2;
                if (invincibleTimer===0) { scoreHold=false; rampStartSpeed=currentSpeed; isSpeedRamping=true; rampTimer=0; }
            } else dinoFlash=0;
            
            if (isSpeedRamping) {
                rampTimer++;
                if (rampTimer >= RAMP_DURATION) { currentSpeed = rampTargetSpeed; isSpeedRamping=false; }
                else { const t = rampTimer/RAMP_DURATION; currentSpeed = rampStartSpeed + (rampTargetSpeed-rampStartSpeed)*t; }
            }
            
            dinoVy += GRAVITY; dinoY += dinoVy;
            if(dinoY >= GROUND_Y - DINO_H) { dinoY = GROUND_Y - DINO_H; dinoVy = 0; onGround = true; }
            if(dinoY < 0) { dinoY = 0; if(dinoVy<0) dinoVy=0; }
            
            for(let i=0;i<obstacles.length;i++) obstacles[i].x -= currentSpeed;
            obstacles = obstacles.filter(obs => obs.x + obs.w > 0);
            
            if (!scoreHold) {
                let gain = 0.24 + (currentSpeed - BASE_SPEED)*0.045;
                if(gain>0.72) gain=0.72;
                score += gain;
                updateUI();
                if (!isSpeedRamping) updateSpeedByScore();
            }
            
            if(spawnDelay <= 0) {
                spawnObstacle();
                let baseDelay = Math.floor(Math.random()*(SPAWN_BASE_DELAY_MAX - SPAWN_BASE_DELAY_MIN + 1) + SPAWN_BASE_DELAY_MIN);
                let reduction = Math.min(28, Math.floor((currentSpeed - BASE_SPEED) * SPAWN_REDUCTION_FACTOR));
                spawnDelay = Math.max(24, baseDelay - reduction);
            } else spawnDelay--;
            
            if(checkCollision()) {
                playSound('hit', 0.28);
                startGameOverAnimation();
            }
            
            updateWeatherParticles();
            cloudOffset = (cloudOffset + currentSpeed * 0.3) % 2000;
            midgroundOffset = (midgroundOffset + currentSpeed * 0.6) % 1500;
            foregroundOffset = (foregroundOffset + currentSpeed) % canvas.width;
        }
        
        function gameLoop() {
            if (gameState === 'gameOverAnimation') updateGameOverAnimation();
            else updateGame();
            render();
            requestAnimationFrame(gameLoop);
        }
        
        function onUserInteraction() { if(audioCtx && audioCtx.state === 'suspended') audioCtx.resume(); }
        
        window.addEventListener('keydown', (e) => {
            if(e.key === ' ' || e.key === 'ArrowUp') {
                e.preventDefault(); onUserInteraction();
                if (gameState === 'idle' || gameState === 'gameOverAnimation') startGame();
                else if (gameState === 'paused') stopResume();
                else if (gameState === 'playing') performJump();
            }
        });
        const stopResumeBtn = document.getElementById('stopResumeBtn');
        const restartBtn = document.getElementById('restartBtn');
        const resetBestBtn = document.getElementById('resetBestBtn');
        const startBtn = document.getElementById('startBtn');
        const mobileJumpBtn = document.getElementById('mobileJumpBtn');
        
        restartBtn.addEventListener('click', () => { onUserInteraction(); restartGame(); });
        stopResumeBtn.addEventListener('click', () => { onUserInteraction(); stopResume(); });
        resetBestBtn.addEventListener('click', () => { onUserInteraction(); resetHighScore(); });
        startBtn.addEventListener('click', (e) => { e.target.style.display = 'none'; onUserInteraction(); startGame(); });
        

        document.getElementById('difficultySelect').addEventListener('change', (e) => {
            const selected = e.target.value;
            applyDifficulty(selected);
        });
        document.getElementById('difficultySelect').addEventListener('click', (e) => { onUserInteraction(); stopResume();});
        if(window.innerWidth <= 720) mobileJumpBtn.style.display = 'inline-block';

        document.querySelector('.game-hub').addEventListener('mousedown', () => {
            onUserInteraction();
            performJump();
        }); 
       document.querySelector('body').addEventListener('mousedown', () => {
            onUserInteraction();
            performJump();
        }); 
        canvas.addEventListener('mousedown', () => { onUserInteraction();
            if (gameState === 'idle' || gameState === 'gameOverAnimation') startGame();
            else if (gameState === 'paused') stopResume();
            else if (gameState === 'playing') performJump();
        }); 


        initAudio();
        applyDifficulty('medium');
        gameState = 'idle';
        gameLoop();
    </script>
</body>
</html>
