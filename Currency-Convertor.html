        body { background: #0f172a; color: white; display: flex; justify-content: center; align-items: center; min-height: 100vh; }
        .container { background: #1e293b; padding: 2rem; border-radius: 20px; width: 400px; box-shadow: 0 10px 25px rgba(0,0,0,0.5); }
        .search-box { position: relative; margin-bottom: 20px; }
        input { width: 100%; padding: 12px; border-radius: 8px; border: none; background: #0f172a; color: white; outline: none; }
        .list { position: absolute; width: 100%; max-height: 200px; overflow-y: auto; background: #334155; display: none; z-index: 10; border-radius: 8px; margin-top: 5px; }
        .list div { padding: 10px; cursor: pointer; display: flex; align-items: center; gap: 10px; }
        .list div.highlighted { background: #38bdf8; color: #0f172a; }
        .swap-btn { text-align: center; margin: 10px 0; font-size: 1.5rem; cursor: pointer; color: #38bdf8; }
        button { width: 100%; padding: 15px; background: #3b82f6; border: none; border-radius: 8px; color: white; font-weight: bold; cursor: pointer; }

        /* Poore HTML page ki scrollbar ki styling */
html::-webkit-scrollbar {
    width: 10px; /* Scrollbar ki motayi */
}

html::-webkit-scrollbar-track {
    background: #0f172a; /* Page ka background color */
}

html::-webkit-scrollbar-thumb {
    background: #3187ff; /* Scrollbar ka color */
    border-radius: 5px; /* Rounded corners */
    border: 1px solid #ffffff; /* Scrollbar ke aas paas border */
}

/* Hover karne par scrollbar ka color change */
html::-webkit-scrollbar-thumb:hover {
    background: #38bdf8; /* Blue color jo aapke converter mein hai */
}
        /* 1. Scrollbar ka width (Thickness) */
.list::-webkit-scrollbar {
    width: 6px; /* Slim and elegant */
}

/* 2. Scrollbar ka Track (Background) */
.list::-webkit-scrollbar-track {
    background: rgba(30, 41, 59, 0.5); /* Background color ke sath mix */
    border-radius: 10px;
}

/* 3. Scrollbar ka Thumb (Moving part) */
.list::-webkit-scrollbar-thumb {
    background: #475569; /* Primary dark grey */
    border-radius: 10px;
    border: 1px solid #1e293b; /* Subtle border */
    transition: background 0.3s ease;
}

/* 4. Interactive State (Hover Effect) */
.list::-webkit-scrollbar-thumb:hover {
    background: #38bdf8; /* Highlight Color (Blue) */
    cursor: pointer;
}
        .header {

    padding: 10px;
    text-transform: uppercase;
    letter-spacing: 2px;
    /* Glassmorphism effect */

    border-bottom: 2px solid #38bdf8;

    let highlightedIndex = -1;
    let cond = {
        style:{
            display:'none'
        }
    };
    function renderList(listId, filterText = "") {
        const list = document.getElementById(listId);
        const filtered = countryData.filter(c => 
            c.code.toLowerCase().includes(filterText.toLowerCase()) || 
            c.name.toLowerCase().includes(filterText.toLowerCase())
        );
        
        list.innerHTML = "";
        highlightedIndex = -1;
        filtered.forEach((c) => {
            const div = document.createElement("div");
            div.innerHTML = `<img src="https://flagsapi.com/${c.flag}/flat/24.png" alt="${c.flag}"> ${c.code} - ${c.name}`;
            div.onclick = () => { selectItem(listId, c.code); };
            
            list.appendChild(div);
        });
        list.style.display = filtered.length > 0 ? 'block' : 'none';
        cond.style.display= list !== cond ? 'none' : 'block'
        cond =list
    }

    function selectItem(listId, code) {
        document.getElementById(listId.replace('List', 'Input')).value = code;
        document.getElementById(listId).style.display = 'none';
    }

    ['from', 'to'].forEach(type => {
        const input = document.getElementById(type + 'Input');
        const list = document.getElementById(type + 'List');

        input.onkeydown = (e) => {
            const items = list.querySelectorAll('div');
            if (items.length === 0) return;

            if (e.key === 'ArrowDown') {
                highlightedIndex = (highlightedIndex + 1) % items.length;
                updateHighlight(items);
            } else if (e.key === 'ArrowUp') {
                highlightedIndex = (highlightedIndex - 1 + items.length) % items.length;
                updateHighlight(items);
            } else if (e.key === 'Enter') {
                e.preventDefault();
                if (highlightedIndex > -1) items[highlightedIndex].click();
            }
        };
        input.onclick = () => renderList(type + 'List');
        input.oninput = (e) => renderList(type + 'List', e.target.value);
    });

    function updateHighlight(items) {
        items.forEach((item, i) => item.classList.toggle('highlighted', i === highlightedIndex));
        items[highlightedIndex].scrollIntoView({ block: 'nearest' });
    }

    function swap() {
        let f = document.getElementById('fromInput');
        let t = document.getElementById('toInput');
        [f.value, t.value] = [t.value, f.value];
    }

    async function convert() {
        let amt = document.getElementById("amount").value;
        let f = document.getElementById("fromInput").value;
        let t = document.getElementById("toInput").value;
        let res = await fetch(`https://open.er-api.com/v6/latest/${f}`);
        let data = await res.json();
        console.dir(data)
        document.getElementById("result").innerText = `${amt} ${f} = ${(amt * data.rates[t])} ${t}`;
    }

    document.onclick = (e) => {
        if(!e.target.matches('input')) document.querySelectorAll('.list').forEach(l => l.style.display = 'none');
    };
